backend:
  name: github
  repo: rogeriobayer/bayer.ooo
  branch: main
  # IMPORTANTE: Substitua pela URL do seu worker deployado (passo 3 abaixo)
  # Exemplo com workers.dev: https://bayerooo-decap-auth.seu-account.workers.dev
  # Exemplo com domínio customizado: https://auth.bayer.ooo
  base_url: https://bayerooo-decap-auth.tomatebg.workers.dev
  auth_endpoint: /auth

media_folder: public/images/blog
public_folder: /images/blog

i18n:
  structure: multiple_files
  locales: [pt, en, fr]
  default_locale: pt

collections:
  - name: "blog"
    label: "Blog"
    folder: "content/blog"
    create: true
    slug: "{{fields.slug}}"
    i18n: true
    fields:
      - { label: "Título", name: "title", widget: "string", i18n: true }
      - { label: "Slug", name: "slug", widget: "string", i18n: duplicate }
      - { label: "Data", name: "date", widget: "datetime", i18n: duplicate }
      - { label: "Idioma", name: "lang", widget: "select", options: ["pt", "en", "fr"], i18n: duplicate }
      - { label: "Resumo", name: "excerpt", widget: "text", i18n: true }
      - { label: "Tags", name: "tags", widget: "list", i18n: true }
      - { label: "Capa", name: "cover", widget: "image", required: false, i18n: duplicate }
      - { label: "Autor", name: "author", widget: "string", default: "Rogério Bayer", i18n: duplicate }
      - { label: "Corpo", name: "body", widget: "markdown", i18n: true }
